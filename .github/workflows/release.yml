name: 建立發佈版本與壓縮檔

on:
  push:
    tags:
      - 'v*'

# --- 加入以下這段權限宣告 ---
permissions:
  contents: write
# --------------------------

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 建立壓縮檔
        run: |
          zip -r bot_files.zip . -x "*.git*" "venv/*" ".env"

      - name: 安裝 PyInstaller
        run: pip install pyinstaller discord.py python-dotenv

      - name: 打包成 EXE
        run: pyinstaller --onefile --name "DiscordBanBot" bot.py

      - name: 建立發佈版本
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DiscordBanBot.exe
            .env.example
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 建立 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bot_files.zip
          name: Release ${{ github.ref_name }}
          body: "自動產生版本發佈。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}