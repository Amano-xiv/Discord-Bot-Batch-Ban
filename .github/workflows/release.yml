name: 建立發佈版本 (包含 EXE)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    # 關鍵：使用 windows 環境才能打包出 .exe
    runs-on: windows-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller discord.py python-dotenv

      - name: 打包成 EXE
        run: pyinstaller --onefile --name "DiscordBanBot" bot.py

        - name: 打包成 EXE
        run: |
          pip install pyinstaller discord.py python-dotenv
          # 打包程式
          pyinstaller --onefile --name "DiscordBanBot" bot.py

      - name: 準備發佈資料夾
        run: |
          # 1. 建立一個要給使用者看到的資料夾名稱
          mkdir DiscordBanBot_Tool
          
          # 2. 將產出的 exe 複製進去
          cp dist/DiscordBanBot.exe DiscordBanBot_Tool/
          
          # 3. 將環境變數範例檔複製進去
          cp .env.example DiscordBanBot_Tool/.env
          
          # 4. 將README打包進去
          if [ -f "README.md" ]; then cp README.md DiscordBanBot_Tool/; fi
          
          # 5. 將整個資料夾壓縮成一個 zip
          zip -r DiscordBanBot_v${{ github.ref_name }}.zip DiscordBanBot_Tool/

      - name: 建立壓縮檔 (僅包含必要檔案)
        # Windows 環境下使用 PowerShell 進行壓縮
        run: |
          Compress-Archive -Path "bot.py", "README.md", ".env.example" -DestinationPath "bot_source.zip"

      - name: 建立 GitHub Release 並上傳檔案
        uses: softprops/action-gh-release@v2
        with:
          files: DiscordBanBot_v${{ github.ref_name }}.zip
          name: Release ${{ github.ref_name }}
          body: |
            ### 📥 使用說明
            1. 下載並解壓縮 `DiscordBanBot.zip`。
            2. 使用記事本開啟 `.env`，填入您的 Bot Token。
            3. 執行 `DiscordBanBot.exe` 即可開始使用。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}