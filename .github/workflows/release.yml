name: 建立發佈版本 (包含 EXE)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller discord.py python-dotenv

      - name: 打包成 EXE
        run: pyinstaller --onefile --name "DiscordBanBot" bot.py

      - name: 準備發佈資料夾與壓縮
        shell: pwsh
        run: |
          # 1. 建立發佈用的資料夾
          New-Item -ItemType Directory -Path "DiscordBanBot_Tool"
          
          # 2. 複製執行檔
          Copy-Item "dist/DiscordBanBot.exe" -Destination "DiscordBanBot_Tool/"
          
          # 3. 複製並改名 .env.example 為 .env
          if (Test-Path ".env.example") {
              Copy-Item ".env.example" -Destination "DiscordBanBot_Tool/.env"
          }
          
          # 4. 複製 README
          if (Test-Path "README.md") {
              Copy-Item "README.md" -Destination "DiscordBanBot_Tool/"
          }
          
          # 5. 使用 PowerShell 進行壓縮 (包含資料夾內容)
          Compress-Archive -Path "DiscordBanBot_Tool" -DestinationPath "DiscordBanBot_v${{ github.ref_name }}.zip"

      - name: 建立 GitHub Release 並上傳檔案
        uses: softprops/action-gh-release@v2
        with:
          files: DiscordBanBot_v${{ github.ref_name }}.zip
          name: Release ${{ github.ref_name }}
          body: |
            ### 📥 使用說明
            1. 下載並解壓縮 `DiscordBanBot_v${{ github.ref_name }}.zip`。
            2. 使用記事本開啟資料夾內的 `.env`，填入Bot Token 並儲存。
            3. 前往 [Discord Developer Portal](https://discord.com/developers/applications) 進行設定。
            4. 執行 `DiscordBanBot.exe` 即可開始使用。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}